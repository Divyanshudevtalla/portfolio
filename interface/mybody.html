<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Portfolio</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #3b82f6;
            --card: #16161a;
            --text: #f8fafc;
            --dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }

        /* Navigation */
        nav { padding: 2rem 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: -1px; font-size: 1.2rem; }
        .logo span { color: var(--accent); }

        /* Hero */
        header { padding: 10vh 0; }
        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1; margin-bottom: 1.5rem; font-weight: 900; letter-spacing: -3px; }
        .hero-p { font-size: 1.2rem; color: var(--dim); max-width: 500px; margin-bottom: 2.5rem; }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.2s ease;
        }
        .btn:active { transform: scale(0.96); }

        /* Projects */
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 2rem; font-weight: 800; }
        
        .project-grid { display: grid; gap: 1rem; }
        .project-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .project-card:hover { border-color: var(--accent); background: #1c1c21; }
        .project-card h3 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .project-card p { color: var(--dim); font-size: 0.95rem; }

        /* Footer */
        footer { padding: 4rem 0; text-align: center; color: #444; font-size: 0.9rem; }

        /* Decorative Glow */
        .glow {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
