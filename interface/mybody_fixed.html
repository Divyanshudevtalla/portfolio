<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divyanshu | Portfolio</title>
  <style>
    :root{--bg:#030712;--accent:#6366f1;--card:#111827;--text:#f9fafb;--dim:#9ca3af;--border:rgba(255,255,255,0.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif}
    .container{max-width:900px;margin:0 auto;padding:2rem}
    h1{font-size:2rem;margin-bottom:1rem}
    .card{background:var(--card);padding:1.25rem;border-radius:12px;border:1px solid var(--border)}
    .row{display:flex;gap:1rem;flex-wrap:wrap}
    .col{flex:1;min-width:260px}
    label{display:block;font-weight:700;margin-bottom:.25rem}
    input,textarea{width:100%;padding:.6rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text)}
    .btn{display:inline-block;padding:.6rem 1rem;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact</h1>
    <div class="row">
      <div class="col card">
        <h3>Contact Details</h3>
        <p style="color:var(--dim)">I'm available for freelance and full-time opportunities.</p>
        <p><strong>Email:</strong> <a href="mailto:divyanshu@developer.io" style="color:var(--accent)">divyanshu@developer.io</a></p>
        <p><strong>Phone:</strong> <a href="tel:+1234567890" style="color:var(--accent)">+1 (234) 567-890</a></p>
        <p><strong>Location:</strong> Bangalore, India</p>
      </div>
      <div class="col card">
        <h3>Mail Me</h3>
        <form id="mailForm">
          <label for="name">Name</label>
          <input id="name" name="name" required>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
          <div style="margin-top:.75rem;display:flex;gap:.5rem">
            <button class="btn" type="submit">Send Message</button>
            <a class="btn" href="mailto:divyanshu@developer.io">Email Directly</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    // simple client-side form handler (no backend)
    document.getElementById('mailForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('This is a static demo — configure a backend or third-party service to send email.');
    });
  </script>
</body>
</html>
